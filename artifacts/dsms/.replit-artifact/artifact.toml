kind = "web"
previewPath = "/"
title = "Dasmesh Stock Management System"
version = "1.0.0"
id = "artifacts/dsms"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22009

[services.development]
run = "pnpm --filter @workspace/dsms run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dsms", "run", "build" ]
publicDir = "artifacts/dsms/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22009"
BASE_PATH = "/"
